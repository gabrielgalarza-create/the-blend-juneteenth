<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Pre-Register</title>
<meta name="robots" content="noindex" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: Poppins, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    overflow: auto;
  }
  body { padding: 24px 20px; box-sizing: border-box; }
  /* Hide the widget once we've successfully clicked the trigger so only
     the Sweatpals popup overlay remains visible. */
  body.is-popup-open #sweatpals-host { visibility: hidden; }
  /* Loading hint while we wait for Sweatpals's script to render */
  #loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,.65);
    font-size: 14px;
    letter-spacing: 0.04em;
    pointer-events: none;
    transition: opacity .3s ease;
    z-index: -1;
  }
  body.is-popup-open #loading { display: none; }
</style>
</head>
<body>

<div id="loading">Loading waitlist…</div>

<!-- Sweatpals auto-embed widget. Renders inline; we auto-click its
     "Click to get Notified + Early Access" button as soon as it appears
     so the Sweatpals Join Waitlist popup mounts. -->
<div id="sweatpals-host">
  <script src="https://sweatpals.com/static/embed/event/checkout/script.js?enableAutoEmbed=true&eventAlias=juneteenth-the-blend-coffee-and-rb-day-party&colorHex=ffffff&backgroundHex=000000&fontFamily=Poppins&priceTierId=55dbd013-b471-4a04-9b76-c5b5b0bddd3d"></script>
</div>

<script>
  (function () {
    let clicked = false;
    const start = Date.now();

    function findTrigger() {
      const candidates = document.querySelectorAll('button, [role="button"], a');
      for (const el of candidates) {
        const text = (el.textContent || '').trim().toLowerCase();
        if (
          text.includes('notif') ||
          text.includes('early access') ||
          text.includes('waitlist') ||
          text.includes('get notified') ||
          text.includes('rsvp') ||
          text.includes('register')
        ) {
          return el;
        }
      }
      return null;
    }

    function tryClick() {
      if (clicked) return true;
      const t = findTrigger();
      if (t) {
        clicked = true;
        try { t.click(); } catch (e) {}
        // Hide the widget once the popup overlays the page
        setTimeout(() => { document.body.classList.add('is-popup-open'); }, 300);
        return true;
      }
      return false;
    }

    // Poll until found or 15s elapsed
    const poll = setInterval(() => {
      if (tryClick() || Date.now() - start > 15000) {
        clearInterval(poll);
      }
    }, 200);

    // Also react to DOM changes for React-rendered injection
    const observer = new MutationObserver(() => { if (tryClick()) observer.disconnect(); });
    observer.observe(document.documentElement, { childList: true, subtree: true });
    setTimeout(() => observer.disconnect(), 15000);
  })();
</script>

</body>
</html>
