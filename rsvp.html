<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Pre-Register</title>
<meta name="robots" content="noindex" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: Poppins, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    overflow: auto;
  }
  body { padding: 24px 20px; box-sizing: border-box; }
  /* Once we've successfully clicked the trigger, hide everything except
     the Sweatpals popup (which mounts as a MUI modal at root). */
  body.is-popup-open #sweatpals-host { visibility: hidden; pointer-events: none; }
  body.is-popup-open #loading { display: none; }
  #loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,.65);
    font-size: 14px;
    letter-spacing: 0.04em;
    pointer-events: none;
    z-index: -1;
  }
</style>
</head>
<body>

<div id="loading">Loading waitlist…</div>

<!-- Sweatpals auto-embed widget. Renders inline; we auto-click its
     "Click to get Notified + Early Access" button as soon as it appears
     so the Sweatpals Join Waitlist popup mounts. -->
<div id="sweatpals-host">
  <script src="https://sweatpals.com/static/embed/event/checkout/script.js?enableAutoEmbed=true&eventAlias=juneteenth-the-blend-coffee-and-rb-day-party&colorHex=ffffff&backgroundHex=000000&fontFamily=Poppins&priceTierId=55dbd013-b471-4a04-9b76-c5b5b0bddd3d"></script>
</div>

<script>
  (function () {
    let clicked = false;
    const start = Date.now();

    // Match only the exact Sweatpals trigger button by its label
    function findTrigger() {
      const els = document.querySelectorAll(
        '#sweatpals-host button, #sweatpals-host [role="button"], button, [role="button"]'
      );
      for (const el of els) {
        const text = (el.textContent || '').trim().toLowerCase();
        if (text.includes('notified') && (text.includes('early access') || text.includes('click'))) {
          return el;
        }
        if (text.includes('join waitlist') || text.includes('get notified')) return el;
      }
      return null;
    }

    // Fire a full pointer/mouse event sequence so React's synthetic event
    // handlers fire (a plain .click() is often ignored by MUI/React).
    function realisticClick(el) {
      try {
        el.scrollIntoView({ block: 'center', inline: 'center' });
        const opts = { bubbles: true, cancelable: true, view: window, button: 0 };
        ['pointerover','pointerenter','pointerdown','mousedown','pointerup','mouseup','click'].forEach((type) => {
          const Ev = type.startsWith('pointer') && window.PointerEvent ? PointerEvent : MouseEvent;
          el.dispatchEvent(new Ev(type, opts));
        });
        if (typeof el.click === 'function') el.click();
      } catch (e) {}
    }

    function tryClick() {
      if (clicked) return true;
      const t = findTrigger();
      if (!t) return false;
      clicked = true;
      realisticClick(t);
      setTimeout(() => { document.body.classList.add('is-popup-open'); }, 350);
      return true;
    }

    const poll = setInterval(() => {
      if (tryClick() || Date.now() - start > 15000) {
        clearInterval(poll);
      }
    }, 200);

    const observer = new MutationObserver(() => { if (tryClick()) observer.disconnect(); });
    observer.observe(document.documentElement, { childList: true, subtree: true });
    setTimeout(() => observer.disconnect(), 15000);
  })();
</script>

</body>
</html>
