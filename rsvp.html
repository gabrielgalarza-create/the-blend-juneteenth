<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Pre-Register</title>
<meta name="robots" content="noindex" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: Poppins, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
  }
  /* Hide Sweatpals's auto-embedded event-card content so only the popup
     overlay (which mounts to document.body) is visible after auto-click. */
  body > *:not(#sweatpals-host):not(.MuiModal-root):not(.swtp-mui-style-m8dnq0) {
    /* leave other items normal */
  }
  #sweatpals-host {
    visibility: hidden;
    position: fixed;
    left: -99999px;
    top: 0;
    width: 1px;
    height: 1px;
    overflow: hidden;
  }
  /* Loading state shown until Sweatpals popup mounts */
  #loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,.65);
    font-size: 14px;
    letter-spacing: 0.04em;
    pointer-events: none;
    transition: opacity .3s ease;
  }
  #loading.is-hidden { opacity: 0; }
</style>
</head>
<body>

<div id="loading">Loading waitlist…</div>

<!-- Sweatpals auto-embed: invisible widget, used only to bootstrap the popup -->
<div id="sweatpals-host" aria-hidden="true">
  <script src="https://sweatpals.com/static/embed/event/checkout/script.js?enableAutoEmbed=true&eventAlias=juneteenth-the-blend-coffee-and-rb-day-party&colorHex=ffffff&backgroundHex=000000&fontFamily=Poppins&priceTierId=55dbd013-b471-4a04-9b76-c5b5b0bddd3d"></script>
</div>

<script>
  // Watch for Sweatpals to inject the early-access trigger button anywhere on the
  // page, then click it programmatically so the Join Waitlist popup opens.
  (function () {
    const loading = document.getElementById('loading');
    let clicked = false;

    function findTrigger() {
      // Look across the whole document since Sweatpals may inject outside our host
      const candidates = document.querySelectorAll('button, [role="button"], a');
      for (const el of candidates) {
        const text = (el.textContent || '').trim().toLowerCase();
        if (
          text.includes('notif') ||
          text.includes('early access') ||
          text.includes('waitlist') ||
          text.includes('join waitlist') ||
          text.includes('rsvp') ||
          text.includes('pre-register') ||
          text.includes('preregister') ||
          text.includes('get notified')
        ) {
          return el;
        }
      }
      return null;
    }

    function tryClick() {
      if (clicked) return true;
      const t = findTrigger();
      if (t) {
        clicked = true;
        t.click();
        // Hide the loading once the popup has mounted
        setTimeout(() => { loading.classList.add('is-hidden'); }, 250);
        return true;
      }
      return false;
    }

    // Poll for the trigger button (covers both immediate-render and slow-render cases)
    const start = Date.now();
    const poll = setInterval(() => {
      if (tryClick() || Date.now() - start > 10000) {
        clearInterval(poll);
      }
    }, 150);

    // Also watch for DOM changes (covers React-rendered injection)
    const observer = new MutationObserver(() => { if (tryClick()) observer.disconnect(); });
    observer.observe(document.documentElement, { childList: true, subtree: true });
    setTimeout(() => observer.disconnect(), 10000);
  })();
</script>

</body>
</html>
